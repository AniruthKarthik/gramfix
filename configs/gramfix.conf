# Default GramFix configuration
# This file is read by scripts but currently gramfix uses CLI flags.
# Future: support config file via GRAMFIX_CONFIG env var.

# Language for LanguageTool (BCP-47 codes: en-US, en-GB, de-DE, fr, es...)
GRAMFIX_LANG=en-US

# Override LanguageTool JAR path (leave empty to auto-detect)
GRAMFIX_LT_JAR=

# Enable debug logging (true/false)
GRAMFIX_DEBUG=false

# Log to file in addition to stderr (true/false)
GRAMFIX_LOG_FILE=false
