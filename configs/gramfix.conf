# GramFix configuration
# Source this file or set these env vars before running gramfix.
# All values can also be passed as CLI flags (run `gramfix --help`).

# ── Language ──────────────────────────────────────────────────────────────────
# BCP-47 language code: en-US, en-GB, de-DE, fr, es, pt-BR, ...
GRAMFIX_LANG=en-US

# ── LanguageTool JAR ──────────────────────────────────────────────────────────
# Override auto-detection.  Leave empty to search standard paths.
GRAMFIX_LT_JAR=

# ── LanguageTool server (optional) ───────────────────────────────────────────
# When set, gramfix tries the HTTP API first then falls back to the CLI JAR.
# Run `make lt-server` to install the systemd service.
# Leave empty to always use the CLI JAR (zero idle RAM).
GRAMFIX_LT_SERVER_URL=

# ── N-gram language model (optional, large) ───────────────────────────────────
# Path to a directory containing LT ngram data (e.g. ngrams-en-20150817/).
# Enables contextual disambiguation of confusion pairs (their/there, etc.).
# Download: install.sh --with-ngrams  (~1.6 GB compressed, ~8 GB extracted).
# Leave empty to skip (confusion pairs will be handled by rule-based checks only).
GRAMFIX_NGRAM_DIR=

# ── Custom rules file ─────────────────────────────────────────────────────────
# Path to an additional LT XML rules file loaded at startup.
# The bundled file covers common patterns not in LT's default ruleset.
GRAMFIX_CUSTOM_RULES=/usr/local/share/gramfix/rules/gramfix-custom.xml

# ── Rule tuning ───────────────────────────────────────────────────────────────
# Comma-separated LT rule IDs to suppress (false positives on tech writing).
GRAMFIX_DISABLED_RULES=UPPERCASE_SENTENCE_START,WORD_CONTAINS_UPPERCASE,EN_QUOTES,DASH_RULE,UNLIKELY_OPENING_PUNCTUATION,ARROWS,WHITESPACE_RULE

# Comma-separated LT category IDs to enable.
# Leave empty to use LT defaults (all non-premium categories).
GRAMFIX_ENABLED_CATEGORIES=TYPOS,GRAMMAR,CASING,CONFUSED_WORDS,PUNCTUATION,COMPOUNDING,SEMANTICS

# Minimum confidence score (0–100) for a match to be applied.
# Higher = fewer false positives, lower = more corrections.
# Recommended range: 55–75.
GRAMFIX_CONFIDENCE=60

# ── JVM tuning ────────────────────────────────────────────────────────────────
# Maximum heap size for the LanguageTool JVM process.
# 256m is sufficient for English; increase if using large n-gram models.
GRAMFIX_JVM_XMX=256m

# ── OpenRouter API (optional, cloud-enhanced) ───────────────────────────────
# When OPENROUTER_API_KEY is set, gramfix uses the OpenRouter API first
# with a silent fallback to local LanguageTool on any failure.
OPENROUTER_API_KEY=
# Leave empty to use the default free model list with automatic fallback:
# 1. deepseek/deepseek-chat-v3-0324:free
# 2. qwen/qwen3-235b-a22b:free
# 3. meta-llama/llama-3.3-70b-instruct:free
OPENROUTER_MODEL=

# ── Logging ───────────────────────────────────────────────────────────────────
GRAMFIX_DEBUG=false
GRAMFIX_LOG_FILE=false
